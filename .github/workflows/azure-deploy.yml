# ===========================================
# GitHub Actions - Azure App Service Deployment
# BCABuddy CI/CD Pipeline
# ===========================================

name: Deploy BCABuddy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: bcabuddy       # Replace with your Azure App Service name
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Expo web
        run: npx expo export --platform all

      - name: Install server dependencies
        run: npm install express compression --save

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp server.js deploy/
          cp web.config deploy/
          cp package.json deploy/
          cp -r dist deploy/
          cd deploy && npm install express compression --production

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy

      - name: Health check
        run: |
          sleep 30
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health || echo 'Health check pending...'
