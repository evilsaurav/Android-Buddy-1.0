# ===========================================
# Azure DevOps Pipeline
# BCABuddy CI/CD for Azure App Service
# ===========================================

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'YOUR_AZURE_SUBSCRIPTION'  # Replace with your subscription
  appName: 'bcabuddy'                             # Replace with your App Service name
  nodeVersion: '20.x'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build Expo Web App'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: 'Install Node.js'

          - script: npm ci --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npx expo export --platform all
            displayName: 'Build Expo web export'

          - script: npm install express compression --save
            displayName: 'Install server dependencies'

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/app
              cp server.js $(Build.ArtifactStagingDirectory)/app/
              cp web.config $(Build.ArtifactStagingDirectory)/app/
              cp package.json $(Build.ArtifactStagingDirectory)/app/
              cp -r dist $(Build.ArtifactStagingDirectory)/app/
              cd $(Build.ArtifactStagingDirectory)/app
              npm install express compression --production
            displayName: 'Prepare deployment package'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/app'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/bcabuddy.zip'
            displayName: 'Archive deployment package'

          - publish: $(Build.ArtifactStagingDirectory)/bcabuddy.zip
            artifact: drop
            displayName: 'Publish artifact'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to Azure App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appType: 'webAppLinux'
                    appName: $(appName)
                    package: '$(Pipeline.Workspace)/drop/bcabuddy.zip'
                    runtimeStack: 'NODE|20-lts'
                  displayName: 'Deploy to Azure App Service'
